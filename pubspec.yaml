name: events_app
description: "Events Platform Mobile"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # HTTP Client
  dio: ^5.3.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # UUID
  uuid: ^4.0.0

  # Google Maps
  # Image Picker
  image_picker: ^1.0.0

  # Date handling
  intl: ^0.19.0
  flutter_secure_storage: ^10.3.1

  geolocator: ^9.0.0
  permission_handler: ^11.4.0

  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3

  connectivity_plus: ^6.0.0
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true